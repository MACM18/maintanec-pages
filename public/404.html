<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found | MACM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">M</div>
        <span>MACM</span>
      </div>

      <div class="status"><span class="dot amber"></span> Not Found</div>

      <h1>Page Not Found</h1>
      <p class="desc">The resource you requested doesn't exist on this server. It may have been moved or removed.</p>

      <div class="actions">
        <button onclick="history.back()" class="btn btn-primary">← Go Back</button>
        <a href="https://macm.dev" class="btn btn-ghost">MACM Homepage</a>
      </div>

      <div class="err-code">404</div>
    </div>
    <div class="meta">macm • not_found</div>
  </div>
</body>
</html>
