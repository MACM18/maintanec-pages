<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 — Maintenance | MACM</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .progress { width: 100%; height: 3px; background: rgba(255,255,255,0.04); border-radius: 99px; overflow: hidden; margin-bottom: 1.75rem; }
    .progress-bar { height: 100%; width: 60%; border-radius: 99px; background: linear-gradient(90deg, #1d4ed8, #3b82f6, #22d3ee); background-size: 200% 100%; animation: slide 2.5s ease-in-out infinite; }
    @keyframes slide { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">M</div>
        <span>MACM</span>
      </div>

      <div class="status"><span class="dot amber"></span> Maintenance</div>

      <h1>We'll Be Right Back</h1>
      <p class="desc">This service is undergoing scheduled maintenance. We're improving performance and security.</p>

      <div class="progress"><div class="progress-bar"></div></div>

      <div class="actions">
        <button onclick="location.reload()" class="btn btn-primary">⟳ Check Again</button>
        <a href="https://macm.dev" class="btn btn-ghost">MACM Status</a>
      </div>

      <div class="err-code">503</div>
    </div>
    <div class="meta">macm • service_unavailable</div>
  </div>
</body>
</html>
